version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: intune_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: intune_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: intune_redis
    restart: always
    ports:
      - "6379:6379"

  api:
    build: .
    container_name: intune_api
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql+aiomysql://root:${DB_PASSWORD:-root}@db:3306/intune_db
      - REDIS_URL=redis://redis:6379/0
      - ENABLE_SSO=true
      - ENABLE_DRIFT_DETECTION=true
    depends_on:
      - db
      - redis

  celery_worker:
    build: .
    container_name: intune_celery_worker
    restart: always
    command: celery -A app.tasks worker -l info
    environment:
      - DATABASE_URL=mysql+aiomysql://root:${DB_PASSWORD:-root}@db:3306/intune_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis

  celery_beat:
    build: .
    container_name: intune_celery_beat
    restart: always
    command: celery -A app.tasks beat -l info
    environment:
      - DATABASE_URL=mysql+aiomysql://root:${DB_PASSWORD:-root}@db:3306/intune_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis

volumes:
  db_data:
